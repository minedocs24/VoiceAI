# Soglia minima durata (secondi) per considerare un segmento speaker valido
# Filtra segmenti troppo brevi spesso rumore
min_speaker_segment_duration: 0.3

# Numero speaker
num_speakers_default: null
num_speakers_max: 20

# Embedding model Pyannote
embedding:
  model: null
  device: cuda

# Timeout massimo operazione diarizzazione (secondi)
timeouts:
  max_diarization_seconds: 600
