user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    log_format json_combined escape=json
      '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
      '"method":"$request_method","path":"$request_uri","status":$status,'
      '"duration":$request_time,"bytes_sent":$bytes_sent,'
      '"referer":"$http_referer","user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    map $request_uri $is_upload_endpoint {
        default 0;
        ~^/v1/transcribe 1;
        ~^/api/transcribe 1;
        ~^/upload 1;
    }

    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=read_limit:10m rate=60r/m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

    include /etc/nginx/conf.d/*.conf;
}
