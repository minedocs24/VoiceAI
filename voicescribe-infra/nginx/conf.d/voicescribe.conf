server {
    listen 80;
    server_name _;

    location /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/voicescribe.crt;
    ssl_certificate_key /etc/nginx/certs/voicescribe.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_stapling on;
    ssl_stapling_verify on;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location ^~ /v1/ {
        set $svc01 'voicescribe-api-gateway:8000';
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://$svc01;
    }

    location ^~ /api/ {
        set $svc01 'voicescribe-api-gateway:8000';
        limit_req zone=read_limit burst=30 nodelay;
        proxy_pass http://$svc01;
    }

    location = /docs {
        set $svc01 'voicescribe-api-gateway:8000';
        limit_req zone=read_limit burst=30 nodelay;
        proxy_pass http://$svc01/docs;
    }

    location = /api-docs {
        set $svc01 'voicescribe-api-gateway:8000';
        limit_req zone=read_limit burst=30 nodelay;
        proxy_pass http://$svc01/api-docs;
    }

    location ^~ /ws/ {
        set $svc01 'voicescribe-api-gateway:8000';
        proxy_pass http://$svc01;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        return 404;
    }
}
