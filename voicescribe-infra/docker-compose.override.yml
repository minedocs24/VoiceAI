services:
  postgres:
    ports:
      - "127.0.0.1:15432:5432"

  redis:
    ports:
      - "127.0.0.1:16379:6379"

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/voicescribe.conf:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"
