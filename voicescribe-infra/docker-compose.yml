services:
  postgres:
    image: postgres:16
    container_name: voicescribe-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      VOICESCRIBE_DB_NAME: ${VOICESCRIBE_DB_NAME}
      VOICESCRIBE_DB_USER: ${VOICESCRIBE_DB_USER}
      VOICESCRIBE_DB_PASSWORD: ${VOICESCRIBE_DB_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - voicescribe_internal

  redis:
    image: redis:7-alpine
    container_name: voicescribe-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ:-UTC}
    command: ["/usr/local/bin/redis-entrypoint.sh"]
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - voicescribe_internal

  nginx:
    image: nginx:1.26-alpine
    container_name: voicescribe-nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      voicescribe-api-gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - voicescribe_internal

  prometheus:
    image: prom/prometheus:latest
    container_name: voicescribe-prometheus
    restart: unless-stopped
    env_file:
      - .env
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - voicescribe_internal

  voicescribe-api-gateway:
    build:
      context: ../voicescribe-api-gateway
      dockerfile: Dockerfile
    container_name: voicescribe-api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SVC02_URL: http://voicescribe-file-ingestion:8001
      SVC03_URL: http://voicescribe-quota-manager:8002
      SVC05_URL: http://voicescribe-job-orchestrator:8004
      SVC08_URL: http://voicescribe-export-service:8007
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-file-ingestion:
    build:
      context: ../voicescribe-file-ingestion
      dockerfile: Dockerfile
    container_name: voicescribe-file-ingestion
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_BASE_PATH: /data/input
      QUOTA_MANAGER_URL: http://voicescribe-quota-manager:8002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - voicescribe_input:/data/input
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-quota-manager:
    build:
      context: ../voicescribe-quota-manager
      dockerfile: Dockerfile
    container_name: voicescribe-quota-manager
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-transcription-engine:
    build:
      context: ../voicescribe-transcription-engine
      dockerfile: Dockerfile
    container_name: voicescribe-transcription-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAMDISK_PATH: /mnt/ramdisk
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    tmpfs:
      - /mnt/ramdisk:size=2G
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-diarization-engine:
    build:
      context: ../voicescribe-diarization-engine
      dockerfile: Dockerfile
    container_name: voicescribe-diarization-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAMDISK_PATH: /mnt/ramdisk
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    tmpfs:
      - /mnt/ramdisk:size=1G
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-export-service:
    build:
      context: ../voicescribe-export-service
      dockerfile: Dockerfile
    container_name: voicescribe-export-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_QUEUE_NAME: export_tasks
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      SVC05_CALLBACK_URL: http://voicescribe-job-orchestrator:8004
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RAMDISK_PATH: /mnt/ramdisk
      OUTPUT_BASE_PATH: /data/output
    volumes:
      - voicescribe_output:/data/output
    tmpfs:
      - /mnt/ramdisk:size=1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-export-worker:
    build:
      context: ../voicescribe-export-service
      dockerfile: Dockerfile
    container_name: voicescribe-export-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_QUEUE_NAME: export_tasks
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      SVC05_CALLBACK_URL: http://voicescribe-job-orchestrator:8004
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RAMDISK_PATH: /mnt/ramdisk
      OUTPUT_BASE_PATH: /data/output
    volumes:
      - voicescribe_output:/data/output
    tmpfs:
      - /mnt/ramdisk:size=1G
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "export_tasks", "-c", "4", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-audio-preprocessor:
    build:
      context: ../voicescribe-audio-preprocessor
      dockerfile: Dockerfile
    container_name: voicescribe-audio-preprocessor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      RAMDISK_PATH: /mnt/ramdisk
      STORAGE_BASE_PATH: /data/input
      SVC02_URL: http://voicescribe-file-ingestion:8001
      SVC05_URL: http://voicescribe-job-orchestrator:8004
      SVC03_URL: http://voicescribe-quota-manager:8002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    tmpfs:
      - /mnt/ramdisk:size=1G
    volumes:
      - voicescribe_input:/data/input
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-audio-preprocessor-worker:
    build:
      context: ../voicescribe-audio-preprocessor
      dockerfile: Dockerfile
    container_name: voicescribe-audio-preprocessor-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_QUEUE_NAME: cpu_tasks
      CELERY_WORKER_CONCURRENCY: "12"
      RAMDISK_PATH: /mnt/ramdisk
      STORAGE_BASE_PATH: /data/input
      SVC02_URL: http://voicescribe-file-ingestion:8001
      SVC05_URL: http://voicescribe-job-orchestrator:8004
      SVC03_URL: http://voicescribe-quota-manager:8002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    tmpfs:
      - /mnt/ramdisk:size=1G
    volumes:
      - voicescribe_input:/data/input
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "cpu_tasks", "-c", "12", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  voicescribe-job-orchestrator:
    build:
      context: ../voicescribe-job-orchestrator
      dockerfile: Dockerfile
    container_name: voicescribe-job-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${VOICESCRIBE_DB_USER}:${VOICESCRIBE_DB_PASSWORD}@postgres:5432/${VOICESCRIBE_DB_NAME}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SVC02_URL: http://voicescribe-file-ingestion:8001
      SVC03_URL: http://voicescribe-quota-manager:8002
      SVC04_URL: http://voicescribe-audio-preprocessor:8003
      SVC06_URL: http://voicescribe-transcription-engine:8005
      SVC07_URL: http://voicescribe-diarization-engine:8006
      SVC08_URL: http://voicescribe-export-service:8007
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicescribe_internal

  grafana:
    image: grafana/grafana:latest
    container_name: voicescribe-grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - voicescribe_internal

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  nginx_logs:
  voicescribe_input:
  voicescribe_output:

networks:
  voicescribe_internal:
    name: voicescribe_internal
    driver: bridge
