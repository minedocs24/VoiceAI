openapi: 3.1.0
info:
  title: Job Orchestrator API
  version: 0.1.0
  description: |
    Job orchestration service. Manages pipeline state machine and coordinates downstream services.

servers:
  - url: http://localhost:8004
    description: Local development

paths:
  /jobs:
    post:
      summary: Create job
      operationId: svc05_createJob
      security:
        - InternalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreateResponse'
        '401':
          description: Unauthorized
        '503':
          description: Dispatch failed

  /jobs/{job_id}:
    get:
      summary: Get job
      operationId: svc05_getJob
      security:
        - InternalToken: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
        '404':
          description: Job not found

  /jobs/{job_id}/retry:
    post:
      summary: Retry failed job
      operationId: svc05_retryJob
      security:
        - InternalToken: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retry queued
        '422':
          description: Invalid state
        '503':
          description: Dispatch failed

  /jobs/{job_id}/cancel:
    post:
      summary: Cancel job
      operationId: svc05_cancelJob
      security:
        - InternalToken: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job cancelled
        '422':
          description: Invalid state

  /queue/stats:
    get:
      summary: Queue statistics
      operationId: svc05_getQueueStats
      security:
        - InternalToken: []
      responses:
        '200':
          description: Job counts per status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatsResponse'

  /callbacks/preprocessing-complete:
    post:
      summary: Callback from SVC-04
      operationId: svc05_preprocessingComplete
      security:
        - InternalToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreprocessingCompleteRequest'
      responses:
        '200':
          description: OK

  /callbacks/transcription-complete:
    post:
      summary: Callback from SVC-06
      operationId: svc05_transcriptionComplete
      security:
        - InternalToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranscriptionCompleteRequest'
      responses:
        '200':
          description: OK

  /callbacks/diarization-complete:
    post:
      summary: Callback from SVC-07
      operationId: svc05_diarizationComplete
      security:
        - InternalToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiarizationCompleteRequest'
      responses:
        '200':
          description: OK

  /callbacks/export-complete:
    post:
      summary: Callback from SVC-08
      operationId: svc05_exportComplete
      security:
        - InternalToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportCompleteRequest'
      responses:
        '200':
          description: OK

  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
        '503':
          description: Unhealthy

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Prometheus text format

components:
  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token

  schemas:
    JobCreateRequest:
      type: object
      required: [tenant_id, tier]
      properties:
        job_id:
          type: string
          format: uuid
          nullable: true
          description: Optional; if provided, use existing job (from api-gateway)
        tenant_id:
          type: string
          pattern: '^[a-zA-Z0-9\-]{1,64}$'
        tier:
          type: string
          enum: [FREE, PRO, ENTERPRISE]
        duration_seconds:
          type: number
          nullable: true

    JobCreateResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string

    JobStatusResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        status:
          type: string
        tier_at_creation:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true

    QueueStatsResponse:
      type: object
      properties:
        queued:
          type: integer
        preprocessing:
          type: integer
        transcribing:
          type: integer
        diarizing:
          type: integer
        exporting:
          type: integer
        done:
          type: integer
        failed:
          type: integer

    PreprocessingCompleteRequest:
      type: object
      required: [job_id, tenant_id, success]
      properties:
        job_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        success:
          type: boolean
        ramdisk_path:
          type: string
          nullable: true
        sha256:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    TranscriptionCompleteRequest:
      type: object
      required: [job_id, tenant_id, success]
      properties:
        job_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        success:
          type: boolean
        transcription_raw:
          type: object
          nullable: true
        gpu_inference_ms:
          type: integer
          nullable: true
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    DiarizationCompleteRequest:
      type: object
      required: [job_id, tenant_id, success]
      properties:
        job_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        success:
          type: boolean
        diarization_raw:
          type: object
          nullable: true
        diarization_available:
          type: boolean
          default: true
          description: false when SVC-07 is in fallback (e.g. HuggingFace token invalid)
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    ExportCompleteRequest:
      type: object
      required: [job_id, tenant_id, success]
      properties:
        job_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        success:
          type: boolean
        download_urls:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: URLs per formato (txt, srt, json, docx)
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
